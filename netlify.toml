[build]
  # Site files (index.html, about.html, styles.css, etc.) live at the repo
  # root and are published as-is. The one build step regenerates
  # netlify/functions/corpus-data.json from research.html/financiers.html/
  # disputes.html, so the AI Concierge's corpus can never silently drift out
  # of sync with the actual site content the way it did under manual deploys.
  command = "node scripts/build-corpus.js && node scripts/indexnow-submit.js"  
  publish = "."
  functions = "netlify/functions"

# The frontend calls /api/health, /api/chat, /api/lead, /api/end-session,
# /api/demand-brief, /api/funder-alert-signup — route those straight through
# to the matching serverless function, so no frontend code has to change.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
